<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <defs>
    <!-- Sun & Energy Gradients -->
    <linearGradient id="sunGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FBBF24" />
      <stop offset="50%" stop-color="#F59E0B" />
      <stop offset="100%" stop-color="#EA580C" />
    </linearGradient>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8" />
      <stop offset="100%" stop-color="#0284C7" />
    </linearGradient>
    <linearGradient id="boltGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF" />
      <stop offset="100%" stop-color="#FDE047" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Sun Rays (Rays around circle) -->
  <g stroke="url(#sunGrad)" stroke-width="6" stroke-linecap="round" opacity="0.9">
    <line x1="100" y1="18" x2="100" y2="34" />
    <line x1="100" y1="166" x2="100" y2="182" />
    <line x1="18" y1="100" x2="34" y2="100" />
    <line x1="166" y1="100" x2="182" y2="100" />
    
    <line x1="42" y1="42" x2="54" y2="54" />
    <line x1="146" y1="146" x2="158" y2="158" />
    <line x1="42" y1="158" x2="54" y2="146" />
    <line x1="146" y1="54" x2="158" y2="42" />
  </g>

  <!-- Central Solar Core Circle -->
  <circle cx="100" cy="100" r="54" fill="url(#sunGrad)" filter="url(#glow)" />

  <!-- Inner Solar Grid Arc -->
  <circle cx="100" cy="100" r="44" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.3" stroke-dasharray="8 4" />

  <!-- Initials "ЧІ" in bold white typography -->
  <g fill="#FFFFFF" font-family="system-ui, -apple-system, sans-serif" font-weight="900" font-size="42" text-anchor="middle" dominant-baseline="central">
    <text x="100" y="101" letter-spacing="-1">ЧІ</text>
  </g>

  <!-- Lightning Bolt Overlay Accent -->
  <polygon points="112,68 96,104 106,104 90,136 122,94 110,94" fill="url(#boltGrad)" opacity="0.85" />
</svg>
